name: Deploy Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: hermes
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/hermes/sigint-wiki
            git pull origin main
            npm ci
            npm run build
            echo "Deployed at $(date -u)"
